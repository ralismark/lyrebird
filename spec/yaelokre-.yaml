- title: Cole's Response
  url: https://soundcloud.com/yaelokre/coles-response-1
  cover: https://static.wikia.nocookie.net/the-yaelokre/images/8/87/Cole%27s_Response.jpg/revision/latest/scale-to-width-down/1000?cb=20250603220834
  lrc:
    from_text: |
      [00:00.61] (🐰It doesn't matter, though, does it?)
      [00:19.68] 🐰It starts off slow, though you can't keep up
      [00:23.25] 🐰Feel your feet sink to the ground
      [00:28.11] 🐰It wants you here and it won't let go
      [00:31.53] 🐰Pull you deeper and deeper until you can't be found
      [00:36.41] 🐰Where do I want to be?
      [00:39.97] 🐰Either way, you'll be there with me
      [00:44.09] 🐰I don't think that I could see
      [00:48.09] 🐰Oh! The seeds are growing inside
      [00:51.89] 🐰They want to be free
      [00:55.32] 🐰Hmm-mm, mm-mm
      [01:01.43] 🐰If I crawl out, it leaves you hollow
      [01:05.68] 🐰I carry nothing, but the breath I borrow
      [01:09.75] 🐰Let it hurt, it won't end until you say it should
      [01:16.24] (🐐It's never up to me, silly!)
      [01:17.90] 🐰Pluck my eyes, cut my hair
      [01:22.29] 🐰Break my teeth until it's fair
      [01:26.32] 🐰Let it bleed, let it dry
      [01:30.68] 🐰Let it be (🐐let it be)
      [01:34.65] 🐰It won't get easier
      [01:36.92] 🐰If that's what I think
      [01:38.61] 🐰Slow as the gravel rumble beneath the leathers
      [01:41.22] 🐰Tearing what it could cling to
      [01:43.89] 🐰Scatter, scatter they
      [01:50.37] 🐰They do
      [02:08.95]

